services:
  # === Database ===
  postgres:
    image: postgres:15-alpine
    container_name: healthtrack_postgres
    restart: always
    env_file: .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthtrack -d healthtrack"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # === Cache ===
  redis:
    image: redis:7-alpine
    container_name: healthtrack_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # === Backend API ===
  backend:
    build: ./backend
    container_name: healthtrack_backend
    restart: always
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://healthtrack:${POSTGRES_PASSWORD}@postgres:5432/healthtrack
      DATABASE_URL_SYNC: postgresql://healthtrack:${POSTGRES_PASSWORD}@postgres:5432/healthtrack
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # === Frontend ===
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://zhiviy.com/api
        NEXT_PUBLIC_TELEGRAM_BOT_ID: zhiviy_bot
    container_name: healthtrack_frontend
    restart: always
    networks:
      - internal

  # === Telegram Bot ===
  bot:
    build: ./bot
    container_name: healthtrack_bot
    restart: always
    env_file: .env.production
    environment:
      API_BASE_URL: http://backend:8000/api
    depends_on:
      - backend
    networks:
      - internal

  # === Nginx Reverse Proxy ===
  nginx:
    image: nginx:alpine
    container_name: healthtrack_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

  # === SSL Certificate Manager ===
  certbot:
    image: certbot/certbot
    container_name: healthtrack_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:

networks:
  internal:
    driver: bridge
