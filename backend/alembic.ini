[alembic]
# Alembic Configuration File

# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current working directory
#prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to the constructor of datetime.datetime
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field that's auto-generated by the revision command
# and, by default, the unique identifier for the revision.
#
# revision_character_length = 40

# set to 'true' to run the environment during
# the 'upgrade' process using NullPool instead of the Engine's
# poolclass. This is useful when upgrading databases that only allow
# one pgrepl connection at a time.
#
# poolclass = NullPool

# When set to true, revision file
# headers will be pre-populated with a format cells that must be
# populated by name before they can be used.
# This helps to avoid having migration files in the repository that are not being used.
# You can create your `.env` file in the same directory as alembic.ini and put
# .env in .gitignore. This way, the migration script will use the environment
# variables to get the database url.

# pre_autogenerate_migrations = true

sqlalchemy.url = driver://user:password@localhost/dbname

[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
