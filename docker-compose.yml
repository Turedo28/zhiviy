version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: healthtrack_postgres
    environment:
      POSTGRES_DB: healthtrack
      POSTGRES_USER: healthtrack
      POSTGRES_PASSWORD: healthtrack_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthtrack -d healthtrack"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthtrack_network

  redis:
    image: redis:7-alpine
    container_name: healthtrack_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthtrack_network

volumes:
  postgres_data:
  redis_data:

networks:
  healthtrack_network:
    driver: bridge
